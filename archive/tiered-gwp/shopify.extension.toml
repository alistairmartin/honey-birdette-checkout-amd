# Learn more about configuring your checkout UI extension:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

api_version = "2025-04"

[[extensions]]
name = "tiered-GWP"
handle = "tiered-gwp"
type = "ui_extension"
uid = "03813a86-3982-9358-1ca9-af8112de83b3364f31be"

[[extensions.targeting]]
module = "./src/Checkout.tsx"
target = "purchase.checkout.block.render"

[extensions.capabilities]
api_access = true
network_access = true

# shopify.extension.toml
[settings]

  [[extensions.settings.fields]]
  key = "tiers_config1"
  type = "multi_line_text_field"
  name = "Tiers Configuration #1 (JSON)"
  description = "JSON"

    [[extensions.settings.fields]]
  key = "tiers_config2"
  type = "multi_line_text_field"
  name = "Tiers Configuration #2 (JSON)"
  description = "JSON"

  [[extensions.settings.fields]]
  key = "tiers_config3"
  type = "multi_line_text_field"
  name = "Tiers Configuration #3 (JSON)"
  description = "JSON"

  

  [[extensions.settings.fields]]
  key = "heading"
  type = "single_line_text_field"
  name = "Heading"
  description = "Heading shown above the progress bar. Defaults to 'Free Gift With Purchase'."

      [[extensions.settings.fields]]
  key = "description"
  type = "multi_line_text_field"
  name = "Description"

    [[extensions.settings.fields]]
  key = "added_to_cart_message"
  type = "multi_line_text_field"
  name = "Gift Added To Cart Message"
  description = "e.g. Your Free Gift Has Been Added - you can choose a different gift below."

  [[extensions.settings.fields]]
  key = "language"
  type = "single_line_text_field"
  name = "Language"
  description = "For honey-birdette-eu store only. EN, DE, or FR. The component will only show when the buyer's checkout language matches this value."

  [[extensions.settings.fields]]
  key = "tier_zero_message"
  type = "single_line_text_field"
  name = "Tier Zero Progress Message"
  description = "Text shown above the progress bar when no tier is unlocked yet. Defaults to 'YOU'RE ON TIER 0'."

  [[extensions.settings.fields]]
  key = "staff_email_domain"
  type = "single_line_text_field"
  name = "Staff Email Domain"
  description = "Customers with an email ending in this domain will not see the GWP offer. E.g. @honeybirdette.com"
