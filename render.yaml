# Render Blueprint for the Honey Birdette Checkout (AMD) embedded admin app.
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo -> Apply.
# Spec: https://render.com/docs/blueprint-spec
#
# The service URL will be https://<name>.onrender.com. If Render appends a
# suffix because the name is taken, update SHOPIFY_APP_URL below AND the
# application_url / redirect_urls in shopify.app.toml to match, then redeploy.
services:
  - type: web
    name: honey-birdette-checkout-amd
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # Starter is required to attach a persistent disk
    region: singapore        # closest Render region to the AU store
    autoDeploy: true         # redeploy the backend on every push to the tracked branch.
                             # Independent of `shopify app deploy` (that ships extensions);
                             # this only rebuilds the Remix admin app from the Dockerfile.
    disk:
      name: sqlite-data
      mountPath: /data       # DATABASE_URL points here so sessions survive restarts
      sizeGB: 1
    envVars:
      - key: SHOPIFY_API_KEY
        value: 1ff77f37375f9a6603f22ecd67e5e832  # public client_id, safe to commit
      - key: SHOPIFY_API_SECRET
        sync: false          # set in the Render dashboard (Partners -> app -> API secret key)
      - key: SHOPIFY_APP_URL
        value: https://honey-birdette-checkout-amd.onrender.com
      - key: DATABASE_URL
        value: file:/data/prod.sqlite
      - key: NODE_ENV
        value: production
      # Kibo Checker. All 4 regions (AU/US/UK/EU) in one JSON blob keyed by
      # myshopify domain - each region has its own Kibo instance/credentials.
      # See app/lib/kibo.server.js for the shape. Set in the Render dashboard.
      - key: KIBO_REGIONS
        sync: false
      # Shared secret the cron job presents to /api/kibo-sweep.
      - key: KIBO_SWEEP_SECRET
        sync: false
      # Identify-only by default. Set to "true" to enable the Reimport action
      # (also needs the Kibo "Order create/import" behaviour granted).
      - key: KIBO_REIMPORT_ENABLED
        value: "false"

  # Hourly reconciliation sweep across ALL configured regions. A separate service
  # can't share the web disk, so it calls /api/kibo-sweep over HTTP.
  - type: cron
    name: kibo-sweep
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 * * * *"        # top of every hour
    region: singapore
    autoDeploy: false
    dockerCommand: node ./scripts/kibo-sweep-cron.mjs
    envVars:
      - key: APP_URL
        value: https://honey-birdette-checkout-amd.onrender.com
      - key: KIBO_SWEEP_SECRET
        sync: false              # must match the web service's value
