# Learn more about configuring your checkout UI extension:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

# The version of APIs your extension will receive. Learn more:
# https://shopify.dev/docs/api/usage/versioning
api_version = "2026-04"

[[extensions]]
name = "mexico-tax-number-input"
handle = "mexico-tax-number-input"
type = "ui_extension"
uid = "161a1751-129f-57c6-9843-2c9eca53848e8da56975"

# Renders directly after the shipping address form, so the RFC field appears
# the moment the buyer selects Mexico as the shipping country.
[[extensions.targeting]]
module = "./src/Checkout.jsx"
target = "purchase.checkout.delivery-address.render-after"

[extensions.capabilities]
# Gives your extension access to directly query Shopify’s storefront API.
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#api-access
api_access = true

# Loads the app-owned RFC metafield on the cart so the field can be
# pre-populated if the buyer has already entered it earlier in checkout.
[[extensions.metafields]]
namespace = "$app"
key = "mexicoTaxId"
