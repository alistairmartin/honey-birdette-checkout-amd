query CartInput($tags: [String!]) {
  cart {
    lines {
      merchandise {
        ... on ProductVariant {
          product {
            title
            hasTags(tags: $tags) {
              tag
              hasTag
            }
          }
        }
      }
    }
  }
  discount {
    metafield(namespace: "$app", key: "function-configuration") {
      value
    }
  }
  enteredDiscountCodes {
    code
    rejectable
  }
}
