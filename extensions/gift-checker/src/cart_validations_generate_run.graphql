query CartValidationsGenerateRunInput {
  cart {
    lines {
      quantity
      merchandise {
        ... on ProductVariant {
          product {
            isGwp: hasAnyTag(tags: ["GWP-26-GIFT"])
          }
        }
      }
      cost {
        totalAmount {
          amount
          currencyCode
        }
      }
    }
  }
}
